<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Meta tags for SEO -->
    <meta name="description" content="Discover, search, and track your favorite anime with Aniverse, powered by the Jikan API. Premium analytics and clean aesthetics." />
    <title>Aniverse | Your Ultimate Anime Guide & Tracker</title>
    
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Theme setup to prevent FOUC -->
    <meta name="color-scheme" content="dark light" />
    <script>
      {
        const colorScheme = localStorage.getItem("color-scheme") || 'dark';
        document.querySelector('meta[name="color-scheme"]').content = colorScheme;
        document.documentElement.setAttribute('data-theme', colorScheme);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
